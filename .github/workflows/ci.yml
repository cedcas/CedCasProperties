name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Generate Prisma client (for types)
        run: npx prisma generate
        env:
          DATABASE_URL: mysql://user:password@localhost:3306/cedcas
      - run: npm run typecheck

  build:
    name: Build
    runs-on: ubuntu-latest
    env:
      # Required for Prisma generate (no real DB needed for build check)
      DATABASE_URL: mysql://user:password@localhost:3306/cedcas
      NEXTAUTH_SECRET: ci-secret-placeholder
      NEXTAUTH_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Generate Prisma client
        run: npx prisma generate
      - name: Build Next.js app
        run: npx next build
        env:
          SKIP_ENV_VALIDATION: true
