name: Send scheduled guest messages

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

concurrency:
  group: send-scheduled-messages
  # The cron is idempotent (DB query is "WHERE sendAt <= now() AND status = pending"),
  # so cancelling a stuck-queued previous run is safe — and prevents stuck runs from
  # blocking subsequent hours when GitHub's hosted runner pool can't allocate quickly.
  cancel-in-progress: true

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Call Vercel cron endpoint
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          curl --fail-with-body --silent --show-error \
               --max-time 60 \
               -H "Authorization: Bearer $CRON_SECRET" \
               https://haveninlipa.com/api/cron/send-scheduled-messages
