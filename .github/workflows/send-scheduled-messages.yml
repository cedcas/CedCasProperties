name: Send scheduled guest messages

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

concurrency:
  group: send-scheduled-messages
  cancel-in-progress: false

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Call Vercel cron endpoint
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          curl --fail-with-body --silent --show-error \
               --max-time 60 \
               -H "Authorization: Bearer $CRON_SECRET" \
               https://haveninlipa.com/api/cron/send-scheduled-messages
